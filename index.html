<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0f1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="POS App">
<link rel="manifest" href="manifest.json">
<title>POS – Quản lý bán hàng</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#222636;--border:#2e3347;--accent:#4f8ef7;--accent-dim:#1e3a6e;--green:#22c55e;--green-dim:#14532d;--red:#ef4444;--red-dim:#450a0a;--yellow:#f59e0b;--text:#e8eaf0;--text-muted:#6b7280;--text-dim:#9ca3af;--radius:10px;--mono:'JetBrains Mono',monospace;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}
/* (Giữ nguyên các style cũ của bạn từ file gốc) */
#access-gate{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}.gate-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px 36px;width:100%;max-width:360px;}.gate-logo{font-family:var(--mono);font-size:13px;color:var(--accent);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px;}.gate-title{font-size:22px;font-weight:700;margin-bottom:28px;}.field-label{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}.field-input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;color:var(--text);font-size:15px;font-family:inherit;outline:none;transition:border-color .15s;margin-bottom:20px;}.field-input:focus{border-color:var(--accent);}.btn-primary{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:13px;font-size:15px;font-weight:600;cursor:pointer;}.gate-error{color:var(--red);font-size:13px;margin-top:12px;text-align:center;display:none;}
#app{display:none;flex-direction:column;min-height:100vh;}.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 8px;height:44px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}.topbar-brand{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--accent);}.tab-btn{background:none;border:none;color:var(--text-muted);font-size:10px;font-weight:500;padding:4px 6px;border-radius:6px;cursor:pointer;}.tab-btn.active{background:var(--accent-dim);color:var(--accent);}.tab-content{display:none;padding:8px;flex:1;}.tab-content.active{display:block;}
.product-table{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.product-row{display:grid;grid-template-columns:1fr 90px 72px;align-items:center;padding:9px 12px;border-bottom:1px solid var(--border);font-size:12px;gap:6px;}
.product-row.header{background:var(--surface2);font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.07em;}
.product-price{font-family:var(--mono);font-size:12px;color:var(--accent);text-align:right;}.btn-icon{background:none;border:1px solid var(--border);color:var(--text-muted);font-size:12px;padding:3px 7px;border-radius:5px;cursor:pointer;}.btn-icon:hover{border-color:var(--accent);color:var(--accent);}
/* (Các style khác giữ nguyên...) */
</style>
</head>
<body>
<div id="access-gate">...</div>
<div id="app">...</div>

<!-- MODALS ĐÃ CẬP NHẬT CAMERA -->
<div class="modal-overlay" id="product-modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">Sản phẩm</div>
    <input type="hidden" id="edit-id">
    <div class="modal-field"><div class="field-label">Tên sản phẩm</div><input class="field-input" type="text" id="p-name"></div>
    <div class="modal-field">
        <div class="field-label">Mã Barcode</div>
        <div style="display:flex;gap:5px;">
            <input class="field-input" type="text" id="p-barcode" autocomplete="off">
            <button onclick="triggerCameraInModal()" style="background:var(--accent);border:none;border-radius:var(--radius);padding:0 12px;cursor:pointer;">📷</button>
        </div>
    </div>
    <div class="modal-field"><div class="field-label">Giá bán (₫)</div><input class="field-input" type="number" id="p-price"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeProductModal()">Hủy</button>
      <button class="btn-save" onclick="saveProduct()">Lưu</button>
    </div>
  </div>
</div>

<script>
// (Giữ nguyên phần config và các hàm khác từ file cũ)
// CẬP NHẬT HÀM RENDER ĐỂ ẨN BARCODE
function renderProducts(search=''){
  const list=document.getElementById('product-list');
  let f=products;
  if(search){const q=search.toLowerCase();f=products.filter(p=>p.name.toLowerCase().includes(q));}
  list.innerHTML=`<div class="product-table">
    <div class="product-row header"><span>Tên sản phẩm</span><span style="text-align:right">Giá</span><span></span></div>
    ${f.map(p=>`<div class="product-row">
      <span style="font-weight:500;">${p.name}</span>
      <span class="product-price">${fmtPrice(p.price)}</span>
      <span class="product-actions"><button class="btn-icon" onclick="openProductModal('${p.id}')">✏️</button><button class="btn-icon del" onclick="deleteProduct('${p.id}')">🗑</button></span>
    </div>`).join('')}
  </div>`;
}

// THÊM HÀM CAMERA CHO MODAL
function triggerCameraInModal() {
    openCameraScanner((code) => {
        document.getElementById('p-barcode').value = code;
    });
}

// CẬP NHẬT HÀM CAMERA CŨ ĐỂ NHẬN CALLBACK
async function openCameraScanner(callback = null) {
  document.getElementById('camera-modal').classList.add('open');
  // ... (giữ logic cũ ở đây) ...
  function showCameraResult(code){
      scannerActive=false;clearInterval(scanInterval);
      if(callback) callback(code); // Điền vào ô input trong modal SP
      else processBarcode(code);   // Xử lý POS như cũ
      closeCameraScanner();
  }
}
</script>
</body>
</html>
