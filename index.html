<!DOCTYPE html>
<html lang="vi">
<head>

    <meta charset="UTF-8">
    <title>POS – Quản lý bán hàng</title>
    <!-- (Bạn giữ nguyên CSS cũ ở đây) -->

<body>
<!-- ... (Giữ nguyên phần HTML body từ ACCESS GATE đến hết MODALS) ... -->

<script>
// ===== CONFIG =====
const ACCESS_HASH = '0ffe1abd1a08215353c233d6e009613e95eec4253832a761af28ff37ac5a150c';
const AUTO_SYNC_DELAY = 3000;

// ===== DATA =====
let products  = JSON.parse(localStorage.getItem('pos_products')  || '[]');
let orders    = JSON.parse(localStorage.getItem('pos_orders')    || '[]');
let customers = JSON.parse(localStorage.getItem('pos_customers') || '[]');
let cart = [];
let selectedCustomer = null;
let shopInfo = JSON.parse(localStorage.getItem('pos_shop') || '{"name":"Cửa hàng của tôi","addr":"","phone":""}');
let autoSyncTimer = null;

// ===== AUTO-SAVE DRAFT (MỚI) =====
function autoSaveDraft() {
  const draft = {
    customerName: document.getElementById('customer-name').value,
    customerCode: document.getElementById('customer-code').value,
    cart: cart
  };
  localStorage.setItem('pos_draft', JSON.stringify(draft));
}

function loadDraft() {
  const draft = JSON.parse(localStorage.getItem('pos_draft'));
  if (draft && draft.cart && draft.cart.length > 0) {
    if (confirm('Tìm thấy đơn hàng nháp, bạn có muốn khôi phục?')) {
      document.getElementById('customer-name').value = draft.customerName || '';
      document.getElementById('customer-code').value = draft.customerCode || '';
      cart = draft.cart || [];
      renderCart();
    } else {
      localStorage.removeItem('pos_draft');
    }
  }
}

// ===== CÁC HÀM XỬ LÝ (ĐÃ GỘP) =====
// ... (Các hàm cũ: fmtPrice, showToast, checkAccess, v.v...) ...

// SỬA HÀM RENDER CART ĐỂ AUTO-SAVE
function renderCart(){
  // ... (giữ nguyên logic cũ) ...
  // THÊM DÒNG NÀY VÀO CUỐI HÀM RENDER CART:
  autoSaveDraft(); 
}

// SỬA HÀM SAVE ORDER ĐỂ XÓA NHÁP
function saveOrder(){
  if(!cart.length) return;
  // ... (giữ nguyên logic cũ của hàm saveOrder) ...
  
  // THÊM DÒNG NÀY VÀO SAU KHI LƯU XONG:
  cart=[]; clearSelectedCustomer(); renderCart();
  localStorage.removeItem('pos_draft'); // <--- ĐÃ THÊM Ở ĐÂY
  scheduleAutoSync();
}

// ... (Giữ nguyên các hàm còn lại: processBarcode, changeQty, removeItem, v.v...) ...

// ===== DOMContentLoaded GỘP CHUNG =====
window.addEventListener('DOMContentLoaded',()=>{
    // Khởi tạo cũ
    if(sessionStorage.getItem('pos_access')==='1'){
        document.getElementById('access-gate').style.display='none';
        document.getElementById('app').style.display='flex';
        loadSettings(); renderProducts(); renderCart();
        if(getGsUrl()) syncFromSheets(true);
        loadDraft(); // <--- GỌI KHÔI PHỤC Ở ĐÂY
    }
    
    // Đăng ký sự kiện lắng nghe thay đổi input
    document.addEventListener('input', (e) => {
      if (['customer-name', 'customer-code'].includes(e.target.id)) autoSaveDraft();
    });
});

// ... (Giữ nguyên phần còn lại của script cũ) ...
</script>
</body>
</html>
